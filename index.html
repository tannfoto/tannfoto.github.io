<script id="vn-engine-bundle">
(function (global) {
"use strict";
function create(config = {}) {
const core = {
startEngine(index){
this.initializeI18n?.();
this.playPassage(index);
},
setModesRegistry(registry) {
const source = registry && typeof registry === "object"
? registry
: {};
this.modesRegistry = {
version: Number.isInteger(source.version) ? source.version : 1,
defs: source.defs && typeof source.defs === "object"
? (this.cloneData(source.defs) ?? source.defs)
: Object.create(null)
};
console.log("[VNMode] setModesRegistry", this.modesRegistry);
return this.modesRegistry;
},
setLayouts(layouts) {
this.layouts = layouts && typeof layouts === "object"
? layouts
: Object.create(null);
console.log("[VNPerformance] setLayouts", this.layouts);
},
setActors(actors) {
this.actors = actors && typeof actors === "object"
? actors
: Object.create(null);
console.log("[VNPerformance] setActors", this.actors);
},
setGameConfig(cfg) {
this.gameConfig = cfg || {};
console.log("[VNCore] setGameConfig", this.gameConfig);
return this;
},
setAudioRegistry(audioRegistry = {}) {
this.audioRegistry = {
bgm: audioRegistry.bgm || {},
se: audioRegistry.se || {},
voice: audioRegistry.voice || {}
};
return this;
},
setPanelContentRegistry(registry) {
this.panelContentRegistry = registry && typeof registry === "object"
? registry
: Object.create(null);
console.log("[VNAuxiliary] setPanelContentRegistry", this.panelContentRegistry);
return this.panelContentRegistry;
},
setShowroomContentRegistry(registry) {
this.showroomContentRegistry = registry && typeof registry === "object"
? registry
: Object.create(null);
console.log("[VNAuxiliary] setShowroomContentRegistry", this.showroomContentRegistry);
return this.showroomContentRegistry;
},
setHudContentRegistry(registry) {
this.hudContentRegistry = registry && typeof registry === "object"
? registry
: Object.create(null);
console.log("[VNAuxiliary] setHudContentRegistry", this.hudContentRegistry);
return this.hudContentRegistry;
},
setEntryRegistry(registry) {
const normalized = this.normalizeEntryRegistry?.(registry || {});
this.entryRegistry = normalized || Object.create(null);
this.ensureGameData?.();
this.applyEntryRegistryDefaultsToRunData?.();
this.applyEntryRegistryDefaultsToMetaData?.();
console.log("[VNGameData] setEntryRegistry", {
count: Object.keys(this.entryRegistry || {}).length,
registry: this.entryRegistry
});
return this.entryRegistry;
},
setEventsRegistry(registry) {
this.eventsRegistry = registry && typeof registry === "object"
? registry
: Object.create(null);
},
setGraphsRegistry(registry) {
this.graphsRegistry = registry && typeof registry === "object"
? registry
: Object.create(null);
console.log("[VNRoleplay] setGraphsRegistry", this.graphsRegistry);
},
initializeI18n() {
const available =
Array.from(Object.keys(this.story) || [])
.filter(item => item !== "codes");
this.setAvailableLangs?.(available);
const browserResolved = this.detectBrowserLang?.();
this.setDefaultLang?.(browserResolved || "zh-CN");
const resolved = this.resolveCurrentLang?.();
console.log("[VNRuntime] initializeI18n", {
available,
browserLang: this.getBrowserLang?.(),
defaultLang: this.getDefaultLang?.(),
userLang: this.getUserLang?.(),
resolvedLang: resolved
});
return resolved;
},
getResolvedLang() {
return String(this.getI18nState?.()?.resolvedLang || "zh-CN");
},
getI18nState() {
const state = this.i18nState;
if (!Array.isArray(state.availableLangs)) {
state.availableLangs = [];
}
if (typeof state.browserLang !== "string") state.browserLang = "";
if (typeof state.defaultLang !== "string") state.defaultLang = "zh-CN";
if (typeof state.userLang !== "string") state.userLang = "";
if (typeof state.resolvedLang !== "string") state.resolvedLang = "zh-CN";
return state;
},
hasPassage(index) {return this.story.codes[index] || null;},
requireWord(index, lang, story){
return story?.[lang][index] || null;
},
requireCode(index, story){
return story.codes?.[index] || null;
},
getModesRegistry() {
if (!this.modesRegistry || typeof this.modesRegistry !== "object") {
this.modesRegistry = {
version: 1,
defs: Object.create(null)
};
}
if (!this.modesRegistry.defs || typeof this.modesRegistry.defs !== "object") {
this.modesRegistry.defs = Object.create(null);
}
console.log("[VNMode] getModesRegistry", this.modesRegistry.defs);
return this.modesRegistry;
},
normalizeModeDef(key, def = {}) {
const source = def && typeof def === "object" ? def : {};
const layers = source.layers && typeof source.layers === "object"
? source.layers
: {};
const text = source.text && typeof source.text === "object"
? source.text
: {};
const ui = source.ui && typeof source.ui === "object"
? source.ui
: {};
const input = source.input && typeof source.input === "object"
? source.input
: {};
const policy = source.policy && typeof source.policy === "object"
? source.policy
: {};
return {
layers: {
scene: !!layers.scene,
actors: !!layers.actors,
graph: !!layers.graph,
interactives: !!layers.interactives,
},
ui: {
shells: Array.isArray(ui.shells)
? ui.shells.map(item => String(item || "").trim()).filter(Boolean)
: [],
theme: String(ui.theme || "")
},
policy: {
allowBacklogWheelOpen: !!policy.allowBacklogWheelOpen,
autoPlayback: !!policy.autoPlayback,
seenSkip: !!policy.seenSkip
},
input: {
profile: String(input.profile || "none"),
pointer: String(input.pointer || "none"),
keyboard: String(input.keyboard || "none"),
wheel: String(input.wheel || "none")
},
text: {
speaker: text.speaker || {},
pages: text.pages || {},
choicesAndTargets: text.choicesAndTargets || {},
html: text.html || {}
}
};
},
requireModeDef(mode) {
const key = String(mode || "").trim();
if (!key) return null;
const registry = this.getModesRegistry();
const raw = registry?.defs?.[key] || null;
if (!raw) return null;
const def = this.normalizeModeDef?.(key, raw);
if (!def) {
console.warn(`[VNMode] Mode is not registered: ${key}`);
return null;
}
return def;
},
setBusy(flag){
if(!this.cache) {
this.createCache();
console.log("create cache");
}
this.cache.input.busy = !!flag;
},
buildRenderState(modeDef, context = null) {
const safeContext = context || {};
return {
scene: safeContext?.scene ?? null,
graph: safeContext?.graph ?? null,
interactives: safeContext?.interactives ?? null,
actors: Array.isArray(safeContext?.actors) ? safeContext.actors.slice() : [],
};
},
compareRenderState(modeDef, context = null) {
const nextState = this.buildRenderState?.(modeDef, context) || {};
const prevState = this.currentRenderState || null;
const sameArray = (a, b) => {
const left = Array.isArray(a) ? a : [];
const right = Array.isArray(b) ? b : [];
if (left.length !== right.length) return false;
for (let i = 0; i < left.length; i++) {
if (left[i] !== right[i]) return false;
}
return true;
};
const sameObjectJson = (a, b) => {
try {
return JSON.stringify(a || {}) === JSON.stringify(b || {});
} catch {
return false;
}
};
const diff = {
initial: !prevState,
sceneChanged: !prevState || prevState.scene !== nextState.scene,
graphChanged: !prevState || prevState.graph !== nextState.graph,
interactivesChanged: !prevState || prevState.interactives !== nextState.interactives,
actorsChanged: !prevState || !sameArray(prevState.actors, nextState.actors),
prevState,
nextState
};
console.log("[VNRenderer] compareRenderState", diff);
return diff;
},
commitRenderState(diff = null) {
if (!diff?.nextState) return;
this.currentRenderState =
this.cloneData(diff.nextState) || diff.nextState;
console.log("[VNRenderer] commitRenderState", this.currentRenderState);
},
applyModeUiProfile(modeDef) {
if (!this.root || !modeDef) return false;
const ui = modeDef.ui || {};
const theme = String(ui.theme || "").trim();
const shells = Array.isArray(ui.shells)
? ui.shells.map(item => String(item || "").trim()).filter(Boolean)
: [];
this.root.dataset.vnTheme = theme || "";
const knownShells = [
"dialogue",
"choices",
"hud",
"mode-content",
"map-hint"
];
knownShells.forEach(shell => {
const className = `ui-${shell}`;
const active = shells.includes(shell);
this.root.classList.toggle(className, active);
});
console.log("[VNRenderer] applyModeUiProfile", {
modeKey: modeDef.key,
theme,
shells,
rootClassName: this.root.className,
rootTheme: this.root.dataset.vnTheme
});
